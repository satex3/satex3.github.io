<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Breakout - Mobile Edition</title>
    <style>
        /* Prevent all browser gestures like scrolling, zooming, and swiping to navigate */
        * {
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.1);
            border: 2px solid #333;
            /* Maintain aspect ratio and scale to fit screen width */
            width: 100%;
            max-width: 480px;
            aspect-ratio: 480 / 640;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .message {
            font-size: 2.5rem; /* Slightly smaller for mobile */
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s ease;
            position: absolute;
            text-align: center;
            width: 90%;
        }

        .message.visible {
            opacity: 1;
        }

        #start-hint {
            font-size: 1rem;
            margin-top: 20px;
            color: #0ff;
            position: relative;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="msg-win" class="message" style="color: #0f0;">YOU WIN!</div>
        <div id="msg-over" class="message" style="color: #f00;">GAME OVER</div>
        <div id="msg-start" class="message" style="color: #0ff;">NEON BREAKOUT</div>
        <div id="start-hint" class="message visible">Tap to Start</div>
    </div>
</div>

<script>
/**
 * CONFIGURATION
 */
const CONFIG = {
    CANVAS: {
        WIDTH: 480,
        HEIGHT: 640,
    },
    PADDLE: {
        WIDTH: 80,
        HEIGHT: 12,
        COLOR: '#0ff',
    },
    BALL: {
        RADIUS: 8,
        COLOR: '#fff',
        INITIAL_SPEED: 5,
        SPEED_INCREMENT: 0.0005,
        MAX_SPEED: 12
    },
    BLOCKS: {
        ROWS: 5,
        COLS: 7,
        PADDING: 10,
        OFFSET_TOP: 60,
        OFFSET_LEFT: 35,
        WIDTH: 50,
        HEIGHT: 20,
        COLORS: ['#f0f', '#0ff', '#0f0', '#ff0', '#f00']
    },
    PARTICLES: {
        COUNT: 15,
        MIN_LIFE: 0.01,
        MAX_LIFE: 0.03
    },
    GAME: {
        BG_COLOR: '#000',
    }
};

class Entity {
    constructor(x, y, width, height) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = height;
    }
    get centerX() { return this.x + this.width / 2; }
    get centerY() { return this.y + this.height / 2; }
}

class Particle extends Entity {
    constructor(x, y, color) {
        super(x, y, 4, 4);
        this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1.0;
        this.decay = Math.random() * (CONFIG.PARTICLES.MAX_LIFE - CONFIG.PARTICLES.MIN_LIFE) + CONFIG.PARTICLES.MIN_LIFE;
        this.size = Math.random() * 3 + 2;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
    }
    draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.shadowBlur = 10 * this.life;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

class Paddle extends Entity {
    constructor(x, y, width, height, color) {
        super(x, y, width, height);
        this.color = color;
        this.vx = 0;
    }
    update(canvasWidth) {
        this.x += this.vx;
        if (this.x < 0) this.x = 0;
        if (this.x + this.width > canvasWidth) this.x = canvasWidth - this.width;
    }
    draw(ctx) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.shadowBlur = 0;
    }
}

class Ball extends Entity {
    constructor(x, y, radius, color) {
        super(x - radius, y - radius, radius * 2, radius * 2);
        this.radius = radius;
        this.color = color;
        this.vx = 0;
        this.vy = 0;
        this.speed = CONFIG.BALL.INITIAL_SPEED;
    }
    launch(angle, speed) {
        this.speed = speed;
        this.vx = Math.cos(angle) * this.speed;
        this.vy = Math.sin(angle) * this.speed;
    }
    update(canvasWidth, canvasHeight) {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -1; }
        else if (this.x + this.radius > canvasWidth) { this.x = canvasWidth - this.radius; this.vx *= -1; }
        if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -1; }
        this.speed = Math.min(this.speed + CONFIG.BALL.SPEED_INCREMENT, CONFIG.BALL.MAX_SPEED);
    }
    draw(ctx) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x + this.radius, this.y + this.radius, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.closePath();
        ctx.shadowBlur = 0;
    }
}

class Block extends Entity {
    constructor(x, y, width, height, color) {
        super(x, y, width, height);
        this.color = color;
        this.isDestroyed = false;
    }
    draw(ctx) {
        if (this.isDestroyed) return;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.strokeRect(this.x + 2, this.y + 2, this.width - 4, this.height - 4);
        ctx.shadowBlur = 0;
    }
}

/**
 * MOBILE INPUT HANDLER
 * Handles both Touch and Mouse
 */
class InputHandler {
    constructor(canvas) {
        this.canvas = canvas;
        this.keys = {};
        this.mouseX = 0;
        
        // Mouse
        window.addEventListener('keydown', (e) => this.keys[e.code] = true);
        window.addEventListener('keyup', (e) => this.keys[e.code] = false);
        this.canvas.addEventListener('mousemove', (e) => this._handleMouseMove(e));

        // Touch
        this.canvas.addEventListener('touchstart', (e) => this._handleTouch(e), { passive: false });
        this.canvas.addEventListener('touchmove', (e) => this._handleTouch(e), { passive: false });
    }

    _handleMouseMove(e) {
        const rect = this.canvas.getBoundingClientRect();
        // Important: Scale the coordinate to match the internal canvas resolution
        const scaleX = this.canvas.width / rect.width;
        this.mouseX = (e.clientX - rect.left) * scaleX;
    }

    _handleTouch(e) {
        e.preventDefault(); // Prevent scrolling/refreshing
        const rect = this.canvas.getBoundingClientRect();
        const scaleX = this.canvas.width / rect.width;
        const touch = e.touches[0];
        this.mouseX = (touch.clientX - rect.left) * scaleX;
    }

    isKeyPressed(code) { return this.keys[code]; }
}

class Game {
    constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = CONFIG.CANVAS.WIDTH;
        this.canvas.height = CONFIG.CANVAS.HEIGHT;
        this.input = new InputHandler(this.canvas);
        this.ui = {
            win: document.getElementById('msg-win'),
            over: document.getElementById('msg-over'),
            start: document.getElementById('msg-start'),
            hint: document.getElementById('start-hint')
        };
        this.init();
        this.setupEvents();
    }
    init() {
        this.state = 'START';
        this.paddle = new Paddle(this.canvas.width/2 - CONFIG.PADDLE.WIDTH/2, this.canvas.height - 120, CONFIG.PADDLE.WIDTH, CONFIG.PADDLE.HEIGHT, CONFIG.PADDLE.COLOR);
        this.ball = new Ball(this.canvas.width/2, this.canvas.height - 150, CONFIG.BALL.RADIUS, CONFIG.BALL.COLOR);
        this.blocks = [];
        this.particles = [];
        for (let r = 0; r < CONFIG.BLOCKS.ROWS; r++) {
            for (let c = 0; c < CONFIG.BLOCKS.COLS; c++) {
                const x = c * (CONFIG.BLOCKS.WIDTH + CONFIG.BLOCKS.PADDING) + CONFIG.BLOCKS.OFFSET_LEFT;
                const y = r * (CONFIG.BLOCKS.HEIGHT + CONFIG.BLOCKS.PADDING) + CONFIG.BLOCKS.OFFSET_TOP;
                this.blocks.push(new Block(x, y, CONFIG.BLOCKS.WIDTH, CONFIG.BLOCKS.HEIGHT, CONFIG.BLOCKS.COLORS[r % CONFIG.BLOCKS.COLORS.length]));
            }
        }
        this.hideAllUI();
        this.ui.start.classList.add('visible');
        this.ui.hint.classList.add('visible');
    }
    hideAllUI() {
        this.ui.win.classList.remove('visible');
        this.ui.over.classList.remove('visible');
        this.ui.start.classList.remove('visible');
        this.ui.hint.classList.remove('visible');
    }
    setupEvents() {
        const startAction = (e) => {
            if (e.type === 'touchstart' || e.type === 'mousedown' || e.code === 'Space') {
                if (this.state !== 'PLAYING') this.reset();
            }
        };
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') startAction(e); });
        this.canvas.addEventListener('mousedown', startAction);
        this.canvas.addEventListener('touchstart', startAction, { passive: false });
    }
    reset() {
        this.init();
        this.state = 'PLAYING';
        this.ball.launch(Math.PI * 1.5, CONFIG.BALL.INITIAL_SPEED);
        this.ui.start.classList.remove('visible');
        this.ui.hint.classList.remove('visible');
    }
    createExplosion(x, y, color) {
        for (let i = 0; i < CONFIG.PARTICLES.COUNT; i++) {
            this.particles.push(new Particle(x, y, color));
        }
    }
    update() {
        if (this.state !== 'PLAYING') return;

        // 1. Paddle (Follow input.mouseX)
        const targetX = this.input.mouseX - this.paddle.width / 2;
        this.paddle.x += (targetX - this.paddle.x) * 0.2;
        this.paddle.update(this.canvas.width);

        // 2. Ball
        this.ball.update(this.canvas.width, this.canvas.height);

        // 3. Collision: Ball vs Paddle
        if (this.checkPaddleCollision(this.ball, this.paddle)) {
            const hitPoint = (this.ball.x + this.ball.radius) - this.paddle.centerX;
            const angle = (hitPoint / (this.paddle.width / 2)) * (Math.PI / 3);
            this.ball.launch(Math.PI * 1.5 + angle, this.ball.speed);
            this.ball.y = this.paddle.y - this.ball.radius - 2;
        }

        // 4. Collision: Ball vs Blocks
        for (let b of this.blocks) {
            if (!b.isDestroyed && this.checkCollision(this.ball, b)) {
                b.isDestroyed = true;
                this.ball.vy *= -1;
                this.createExplosion(b.centerX, b.centerY, b.color);
                break;
            }
        }

        // 5. Update Particles
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update();
            if (this.particles[i].life <= 0) this.particles.splice(i, 1);
        }

        // 6. Loss/Win
        if (this.ball.y + this.ball.radius > this.canvas.height) {
            this.state = 'GAMEOVER';
            this.ui.over.classList.add('visible');
        }
        if (this.blocks.every(b => b.isDestroyed)) {
            this.state = 'WIN';
            this.ui.win.classList.add('visible');
        }
    }
    checkPaddleCollision(ball, paddle) {
        return ball.x + ball.radius > paddle.x &&
               ball.x - ball.radius < paddle.x + paddle.width &&
               ball.y + ball.radius > paddle.y &&
               ball.y - ball.radius < paddle.y + paddle.height;
    }
    checkCollision(o1, o2) {
        return o1.x < o2.x + o2.width &&
               o1.x + o1.width > o2.x &&
               o1.y < o2.y + o2.height &&
               o1.y + o1.height > o2.y;
    }
    draw() {
        this.ctx.fillStyle = CONFIG.GAME.BG_COLOR;
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        this.blocks.forEach(b => b.draw(this.ctx));
        this.paddle.draw(this.ctx);
        this.ball.draw(this.ctx);
        this.particles.forEach(p => p.draw(this.ctx));
    }
    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
}

const game = new Game('gameCanvas');
game.loop();
</script>
</body>
</html>
